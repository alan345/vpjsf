# Render Blueprint — https://render.com/docs/blueprint-spec
# Déploiement : pousser ce repo sur GitHub, puis sur Render :
#   Dashboard → New → Blueprint → sélectionner le repo.
# Render crée la base PostgreSQL + le service web et les relie automatiquement.

databases:
  - name: vpjsf-db
    databaseName: vpjsf
    user: vpjsf
    plan: free # passer à "basic-256mb" ou plus pour la production

services:
  - type: web
    name: vpjsf
    runtime: node
    plan: free # passer à "starter" pour éviter la mise en veille
    region: frankfurt # au plus proche de vos visiteurs (ex. frankfurt, oregon)
    # Les devDependencies (prisma, typescript, tailwind…) sont nécessaires au build.
    buildCommand: npm ci --include=dev && npm run build
    # La base PostgreSQL interne n'est PAS joignable pendant le build sur Render
    # (réseau privé disponible uniquement au runtime). Sur le plan gratuit,
    # `preDeployCommand` n'existe pas : on synchronise donc le schéma et on insère
    # les produits d'exemple (seed idempotent) au démarrage, avant `next start`.
    startCommand: npx prisma db push && npm run db:seed && npm run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vpjsf-db
          property: connectionString
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      # URL publique du site (utilisée pour le SEO, le sitemap, l'Open Graph).
      # NEXT_PUBLIC_* est figé au build → renseignez-la puis redéployez.
      # Ex : https://vpjsf.onrender.com ou votre domaine personnalisé.
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
